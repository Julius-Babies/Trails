name: "Setup Project"
description: "Common setup steps for CI"

inputs:
  keystore_file:
    description: "Base64 encoded keystore file"
    required: true
  keystore_password:
    description: "Password for the keystore"
    required: true
  mapbox_secret_token:
    description: "Mapbox secret token"
    required: true
  mapbox_public_token:
    description: "Mapbox public token"
    required: true

runs:
  using: "composite"
  steps:
    - name: Prepare JDK
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: temurin

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Restore Keystore and Configure Properties
      shell: bash
      run: |
        # Restore Keystore
        echo "${{ inputs.keystore_file }}" | base64 -d > "${GITHUB_WORKSPACE}/keystore.jks"
        
        # Make gradlew executable (if not already handled by git)
        chmod +x ./gradlew
        
        # Batch write to local.properties
        {
          echo "signing.default.file=${GITHUB_WORKSPACE}/keystore.jks"
          echo "signing.default.storepassword=${{ inputs.keystore_password }}"
          echo "signing.default.keyalias=key0"
          echo "signing.default.keypassword=${{ inputs.keystore_password }}"
          echo "mapbox.public-token=${{ inputs.mapbox_public_token }}"
        } >> local.properties
        
        echo "mapbox.token=${{ inputs.mapbox_secret_token }}" >> ~/.gradle/gradle.properties