on:
  push:
    branches:
      - main
jobs:
  build-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: checkout@v5
        name: Checkout code

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '24'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build with Gradle
        run: ./gradlew buildServerJar

      - name: Rename artifact
        run: mv build/libs/server*.jar build/libs/server-all.jar

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: server/libs/server-all.jar

  build-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: checkout@v5
        name: Checkout code

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build web
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: web/build

  build-docker:
    runs-on: ubuntu-latest
    needs: [build-server, build-web]
    steps:
      - uses: checkout@v5
        name: Checkout code

      - name: Download server artifact
        uses: actions/download-artifact@v3
        with:
          name: server/libs/server-all.jar

      - name: Download web artifact
        uses: actions/download-artifact@v3
        with:
          name: web/build

      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/Julius-Babies/Trails:latest