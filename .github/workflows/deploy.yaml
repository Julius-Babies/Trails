on:
  push:
    branches:
      - main
jobs:
  build-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v5
        name: Checkout code

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build with Gradle
        run: >
          ./gradlew buildServerJar
          -Pmaven.pkg.github.com.user=${{ secrets.GH_USERNAME }}
          -Pmaven.pkg.github.com.token=${{ secrets.GH_REGISTRY_TOKEN }}

      - name: Rename artifact
        run: mv build/libs/server*.jar build/libs/server-all.jar

      - name: Copy JAR to workspace root
        run: cp build/libs/server-all.jar ../server-all.jar

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: server-all.jar
          name: server_build.jar
          if-no-files-found: error
          retention-days: 4

  build-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v5
        name: Checkout code

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up GitHub Packages npm auth
        run: |
          echo "@Julius-Babies:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_REGISTRY_TOKEN }}" >> .npmrc
          echo "engine-strict=true" >> .npmrc

      - name: Install dependencies
        run: bun install

      - name: Build web
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: web/build
          name: web_build
          if-no-files-found: error
          retention-days: 4

  build-docker:
    runs-on: ubuntu-latest
    needs: [build-server, build-web]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        name: Checkout code

      - name: Download server artifact
        uses: actions/download-artifact@v8
        with:
          name: server_build.jar
          path: ./

      - name: Download web artifact
        uses: actions/download-artifact@v8
        with:
          name: web_build
          path: web_build/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/julius-babies/trails:latest

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        name: Checkout code

      - uses: ./.github/actions/setup-android-project
        name: Setup Project
        with:
          keystore_file: ${{ secrets.KEYSTORE_FILE }}
          keystore_password: ${{ secrets.KEYSTORE_PASSWORD }}
          mapbox_public_token: ${{ secrets.MAPBOX_PUBLIC_TOKEN }}
          mapbox_secret_token: ${{ secrets.MAPBOX_SECRET_TOKEN }}

      - name: Build Android APK
        run: ./gradlew assembleRelease

      - name: Rename APK artifact
        run: mv composeApp/build/outputs/apk/release/composeApp-release.apk Trails.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: Trails.apk
          path: Trails.apk
          compression-level: 0
          if-no-files-found: error


  create_release:
    runs-on: ubuntu-latest
    needs: [build-docker, build-android]
    steps:
      - uses: actions/checkout@v5
        name: Checkout code

      - name: Set date
        run: echo "DATE=$(date '+%d.%m.%Y %H:%M')" >> $GITHUB_ENV
      - name: Set date for tag name
        run: echo "TAG_DATE=$(date '+%Y%m%d_%H-%M')" >> $GITHUB_ENV

      - name: Download Android APK artifact
        uses: actions/download-artifact@v8
        with:
          name: Trails.apk

      - name: Rename APK artifact
        run: mv Trails.apk "Trails ${{ env.TAG_DATE }}.apk"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: Trails ${{ env.TAG_DATE }}.apk
          draft: false
          prerelease: false
          make_latest: true
          name: Trails (${{ env.DATE }})
          fail_on_unmatched_files: true
          tag_name: v${{ env.TAG_DATE }}