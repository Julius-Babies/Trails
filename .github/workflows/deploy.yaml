on:
  push:
    branches:
      - main
jobs:
  build-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v5
        name: Checkout code

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '24'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build with Gradle
        run: >
          ./gradlew buildServerJar
          -Pmaven.pkg.github.com.user=${{ secrets.GH_USERNAME }}
          -Pmaven.pkg.github.com.token=${{ secrets.GH_REGISTRY_TOKEN }}

      - name: Rename artifact
        run: mv build/libs/server*.jar build/libs/server-all.jar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          path: server/build/libs/server-all.jar
          name: server_build.jar

  build-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v5
        name: Checkout code

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up GitHub Packages npm auth
        run: |
          echo "@Julius-Babies:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_REGISTRY_TOKEN }}" >> .npmrc
          echo "engine-strict=true" >> .npmrc

      - name: Install dependencies
        run: bun install

      - name: Build web
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          path: web/build
          name: web_build

  build-docker:
    runs-on: ubuntu-latest
    needs: [build-server, build-web]
    steps:
      - uses: actions/checkout@v5
        name: Checkout code

      - name: Download server artifact
        uses: actions/download-artifact@v4
        with:
          name: server_build.jar

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web_build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USERNAME }}
          password: ${{ secrets.GH_REGISTRY_TOKEN }}

      - name: List files
        run: tree

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/julius-babies/trails:latest
